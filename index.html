<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA - Öğretmen Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-indigo-700 text-white p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fas fa-chalkboard-teacher mr-3"></i> MATOTA Öğretmen Paneli
            </h1>
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="user-email" class="text-sm opacity-90"></span>
                <button onclick="signOut()" class="bg-indigo-800 hover:bg-red-600 px-3 py-1 rounded transition text-sm">Çıkış</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        <!-- Auth Section -->
        <div id="auth-section" class="max-w-md mx-auto mt-10 p-8 bg-white rounded-3xl shadow-2xl border border-indigo-50">
            <h2 class="text-2xl font-bold text-center text-indigo-900 mb-6">Öğretmen Girişi</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
                    <input type="email" id="email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Giriş Yap</button>
                <p class="text-center text-xs text-gray-400 mt-4">Sadece yetkili öğretmenler içindir.</p>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard" class="hidden space-y-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-800">Hoş Geldiniz</h2>
                    <p class="text-slate-500">Öğrencileriniz için yeni oyun modülleri tasarlayın.</p>
                </div>
                <button onclick="openModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold flex items-center shadow-lg transition transform hover:scale-105">
                    <i class="fas fa-plus mr-2"></i> Yeni Oyun Ekle
                </button>
            </div>

            <div id="games-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Oyunlar buraya gelecek -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="game-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 bg-indigo-50 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-indigo-900">Yeni Oyun Modülü Oluştur</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="add-game-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Oyun Başlığı</label>
                    <input type="text" id="game-title" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Örn: Çarpım Tablosu Yarışı" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Oyun HTML Kodu</label>
                    <textarea id="game-html" rows="12" class="w-full p-3 border rounded-xl font-mono text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="<html><body>...</body></html>" required></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border rounded-xl font-bold text-gray-600 hover:bg-gray-50 transition">İptal</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-md transition">Sisteme Yayınla</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://eygvzptaynyysagvgwyh.supabase.co';
        const supabaseKey = 'sb_publishable_JixS3C4jQ2Znrgcr3-IZPg_1MfpvdXW';
        // HATA DÜZELTİLDİ: 'supabase' ismi kütüphane ile çakıştığı için 'supabaseClient' olarak değiştirildi.
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        const appId = 'matota_project_v1';

        // Session Check
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showDashboard(session.user);
        };

        async function showDashboard(user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            loadGames();
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else showDashboard(data.user);
        };

        async function signOut() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function loadGames() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '<div class="col-span-full flex justify-center py-10"><div class="loader"></div></div>';
            
            const { data, error } = await supabaseClient.from('artifacts').select('data').eq('id', appId).single();
            const games = data?.data?.games || [];
            
            grid.innerHTML = '';
            if(games.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">Henüz yayınlanmış oyun yok.</div>';
                return;
            }

            games.forEach((game, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl shadow-sm border border-indigo-50 hover:shadow-md transition";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-gamepad"></i>
                        </div>
                        <button onclick="deleteGame('${game.id}')" class="text-gray-300 hover:text-red-500 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <h4 class="text-xl font-bold text-gray-800 mb-1">${game.title}</h4>
                    <p class="text-xs text-gray-400">Eklenme: ${new Date(game.createdAt).toLocaleDateString('tr-TR')}</p>
                `;
                grid.appendChild(div);
            });
        }

        document.getElementById('add-game-form').onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById('game-title').value;
            const html = document.getElementById('game-html').value;

            const { data: currentData } = await supabaseClient.from('artifacts').select('data').eq('id', appId).single();
            const currentGames = currentData?.data?.games || [];
            
            const newGame = {
                id: crypto.randomUUID(),
                title,
                html,
                createdAt: new Date().toISOString()
            };

            const updatedGames = [newGame, ...currentGames];

            const { error } = await supabaseClient.from('artifacts').upsert({
                id: appId,
                data: { games: updatedGames }
            });

            if (error) alert("Hata: " + error.message);
            else {
                closeModal();
                document.getElementById('add-game-form').reset();
                loadGames();
            }
        };

        async function deleteGame(id) {
            if(!confirm("Bu oyunu silmek istediğinize emin misiniz?")) return;
            const { data } = await supabaseClient.from('artifacts').select('data').eq('id', appId).single();
            const filtered = data.data.games.filter(g => g.id !== id);
            await supabaseClient.from('artifacts').upsert({ id: appId, data: { games: filtered } });
            loadGames();
        }

        function openModal() { document.getElementById('game-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('game-modal').classList.add('hidden'); }
    </script>
</body>
</html>
